<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minha Grade Horária</title>
  <link rel="stylesheet" href="estilo.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div id="telaLogin" class="tela-login">
    <h1>Minha Grade Horária</h1>
    <p>Faça login para acessar sua grade</p>
    <div id="g_id_onload"
         data-client_id="52226131471-5budtffujc484ag6j6mfgcj04i0dt3pd.apps.googleusercontent.com"
         data-callback="aoLogar">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

<div id="telaPrincipal" class="container escondido">
  <div class="topo-usuario">
    <span id="nomeUsuario"></span>
    <button onclick="sair()" class="btn-sair">Sair</button>
  </div>

  <div class="abas-nav">
    <button onclick="mostrarAba('cadastro')" class="botao-aba" id="botaoAbaCadastro">Cadastrar Matérias</button>
    <button onclick="mostrarAba('grade')" class="botao-aba" id="botaoAbaGrade">Grade de Horários</button>
    <button onclick="mostrarAba('calendario')" class="botao-aba" id="botaoAbaCalendario">Calendário</button>
  </div>

  <div id="abaCadastro" class="aba-conteudo">
    <div class="layout-cadastro">
      <div class="formulario">
        <h2>Nova Matéria</h2>
        <input type="text" id="campoMateria" placeholder="Matéria">
        <input type="text" id="campoProfessor" placeholder="Professor">
        <input type="text" id="campoSala" placeholder="Sala">
        <div class="dias-semana">
          <label><input type="checkbox" value="Segunda" class="checkboxDia"> Seg</label>
          <label><input type="checkbox" value="Terça" class="checkboxDia"> Ter</label>
          <label><input type="checkbox" value="Quarta" class="checkboxDia"> Qua</label>
          <label><input type="checkbox" value="Quinta" class="checkboxDia"> Qui</label>
          <label><input type="checkbox" value="Sexta" class="checkboxDia"> Sex</label>
          <label><input type="checkbox" value="Sábado" class="checkboxDia"> Sáb</label>
        </div>
        <input type="text" id="campoHorario" placeholder="Horário">
        <button onclick="cadastrar()">Salvar</button>
      </div>

      <div class="lista-materias">
        <h2>Matérias Cadastradas</h2>
        <div id="areaMaterias"></div>
      </div>
    </div>
  </div>

  <div id="abaGrade" class="aba-conteudo escondido">
    <h2>Minha Grade</h2>
    <div id="areaGrade" class="grade"></div>
  </div>

<div id="abaCalendario" class="aba-conteudo escondido">
  <div class="calendario-nav">
    <button onclick="mudarMes(-1)">‹</button>
    <h2 id="tituloMes"></h2>
    <button onclick="mudarMes(1)">›</button>
  </div>
  <div id="areaCalendario" class="calendario-grade"></div>
</div>

  <script src="app.js"></script>
</body>
</html>
